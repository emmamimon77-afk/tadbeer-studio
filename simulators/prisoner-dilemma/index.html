<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Prisoner's Dilemma - Enhanced | Tadbeer Studio</title>
    <link rel="stylesheet" href="/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        .pd-container { max-width: 800px; margin: 0 auto; padding: 20px; }
        .game-panel { background: linear-gradient(135deg, #1e293b, #0f172a); border-radius: 28px; padding: 30px; margin-bottom: 25px; box-shadow: 0 8px 25px rgba(0,0,0,0.3); border: 1px solid #3b82f6; }
        .stage-badge { display: inline-block; background: #3b82f6; color: white; padding: 4px 12px; border-radius: 50px; font-size: 0.7rem; font-weight: bold; margin-bottom: 15px; }
        .opponent-speech { background: #1e293b; padding: 20px; border-radius: 20px; margin: 15px 0; border-left: 4px solid #3b82f6; color: #e2e8f0; }
        .choice-btn { display: block; width: 100%; padding: 16px 20px; margin: 12px 0; background: #0f172a; border: 2px solid #3b82f6; border-radius: 20px; cursor: pointer; transition: all 0.2s; text-align: left; font-size: 1rem; font-weight: 500; color: #e2e8f0; }
        .choice-btn:hover { background: #3b82f6; transform: translateX(8px); }
        .stats-row { display: flex; justify-content: space-between; gap: 15px; margin-bottom: 25px; flex-wrap: wrap; }
        .stat-card { background: #1e293b; padding: 12px; border-radius: 16px; text-align: center; flex: 1; border: 1px solid #3b82f6; }
        .stat-label { font-size: 0.7rem; color: #94a3b8; }
        .stat-value { font-size: 1.4rem; font-weight: bold; color: #3b82f6; }
        .trust-meter { background: #334155; border-radius: 10px; height: 8px; margin: 15px 0; overflow: hidden; }
        .trust-fill { background: #3b82f6; height: 100%; width: 50%; transition: width 0.5s; }
        .outcome-card { background: #1e293b; border-radius: 24px; padding: 25px; margin-top: 20px; border: 1px solid #3b82f6; display: none; animation: fadeIn 0.5s; }
        .restart-btn { background: #3b82f6; color: white; border: none; padding: 14px 30px; border-radius: 50px; cursor: pointer; font-weight: bold; margin-top: 20px; width: 100%; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 768px) { .pd-container { padding: 12px; } .choice-btn { padding: 12px; font-size: 0.9rem; } }
    </style>
</head>
<body>
    <div id="navbar-placeholder"></div>

    <div class="bismillah">
        بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ
        <div class="bismillah-translation">In the name of Allah, the Most Gracious, the Most Merciful</div>
    </div>

    <div class="pd-container">
        <h1 class="page-title" style="text-align: center; color: #3b82f6;">🔐 Prisoner's Dilemma - Enhanced</h1>
        <p class="page-subtitle" style="text-align: center;">5 rounds. Hidden opponent patterns. Sound effects. Multiple endings.</p>

        <div id="gamePanel" class="game-panel">
            <div class="stats-row">
                <div class="stat-card"><div class="stat-label">Round</div><div class="stat-value" id="roundNum">1</div></div>
                <div class="stat-card"><div class="stat-label">Your Score</div><div class="stat-value" id="yourScore">0</div></div>
                <div class="stat-card"><div class="stat-label">Partner Score</div><div class="stat-value" id="partnerScore">0</div></div>
                <div class="stat-card"><div class="stat-label">Trust Level</div><div class="stat-value" id="trustLevel">50</div></div>
            </div>
            <div class="trust-meter"><div class="trust-fill" id="trustFill"></div></div>

            <div id="gameContent"></div>
        </div>

        <a href="/simulators" class="btn-secondary" style="display: inline-block;">← Back to Simulators</a>
    </div>

    <div id="footer-placeholder"></div>

    <script src="/assets/js/components.js"></script>
    <script>
        let gameState = { round: 1, yourScore: 0, partnerScore: 0, trust: 50, decisions: [], partnerPattern: 'normal' };

        function updateUI() {
            document.getElementById('roundNum').innerText = gameState.round;
            document.getElementById('yourScore').innerText = gameState.yourScore;
            document.getElementById('partnerScore').innerText = gameState.partnerScore;
            document.getElementById('trustLevel').innerText = gameState.trust;
            document.getElementById('trustFill').style.width = gameState.trust + '%';
        }

        function playSound(type) {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                if (type === 'click') { oscillator.frequency.value = 440; gainNode.gain.value = 0.1; oscillator.start(); gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.3); oscillator.stop(audioCtx.currentTime + 0.3); }
                else if (type === 'betray') { oscillator.frequency.value = 220; gainNode.gain.value = 0.15; oscillator.start(); gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.5); oscillator.stop(audioCtx.currentTime + 0.5); }
                else if (type === 'victory') { oscillator.frequency.value = 660; gainNode.gain.value = 0.15; oscillator.start(); gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.8); oscillator.stop(audioCtx.currentTime + 0.8); }
            } catch(e) { console.log('Audio not supported'); }
        }

        function partnerDecision() {
            if (gameState.round === 1) return Math.random() > 0.3 ? 'cooperate' : 'defect';
            const lastPlayer = gameState.decisions[gameState.decisions.length - 1];
            if (gameState.partnerPattern === 'aggressive') return 'defect';
            if (gameState.partnerPattern === 'forgiving') return 'cooperate';
            if (lastPlayer === 'cooperate') return 'cooperate';
            return 'defect';
        }

        function endGame(outcome, message, details, reflection, correctStrategy, personality) {
            playSound(outcome === 'victory' ? 'victory' : 'betray');
            const html = `<div class="outcome-card" style="display: block;"><h3 style="color: #3b82f6;">${outcome.toUpperCase()} ENDING</h3><p>${message}</p><p>${details}</p><div style="background: #0f172a; padding: 20px; border-radius: 20px; margin: 20px 0;"><h4 style="color: #3b82f6;">🧠 Reflection</h4><p><strong>Why:</strong> ${reflection}</p><p><strong>Correct strategy:</strong> ${correctStrategy}</p><hr><p><strong>🎭 Profile:</strong> ${personality}</p><p><strong>📖 Prophetic Tadbeer:</strong> The Prophet (ﷺ) taught that trust, when reciprocated, builds lasting peace. Short-term betrayal often leads to long-term loss.</p></div><button class="restart-btn" onclick="location.reload()">🔄 Play Again</button></div>`;
            document.getElementById('gameContent').innerHTML = html;
        }

        function makeChoice(choice) {
            playSound('click');
            const partner = partnerDecision();
            gameState.decisions.push(choice);
            if (choice === 'cooperate' && partner === 'cooperate') { gameState.yourScore += 3; gameState.partnerScore += 3; gameState.trust += 10; }
            else if (choice === 'cooperate' && partner === 'defect') { gameState.yourScore += 0; gameState.partnerScore += 5; gameState.trust -= 15; }
            else if (choice === 'defect' && partner === 'cooperate') { gameState.yourScore += 5; gameState.partnerScore += 0; gameState.trust -= 10; }
            else if (choice === 'defect' && partner === 'defect') { gameState.yourScore += 1; gameState.partnerScore += 1; gameState.trust -= 5; }
            updateUI();
            if (gameState.round < 5) { gameState.round++; updateUI(); showRound(); }
            else {
                const totalCoop = gameState.decisions.filter(d => d === 'cooperate').length;
                if (totalCoop >= 4) endGame('victory', '🏆 Mutual Trust Victory', 'You built trust through cooperation.', 'You consistently cooperated, building a cooperative equilibrium.', 'You did the right thing. The Prophet (ﷺ) said: "The believer is not one who deceives."', '🕊️ The Trustbuilder');
                else if (totalCoop <= 1) endGame('defeat', '💀 Betrayal Spiral', 'Constant defection led to mutual loss.', 'You betrayed too often. Trust collapsed.', 'You should have cooperated more. Short-term gain led to long-term loss.', '⚡ The Ruthless Competitor');
                else endGame('partial', '⚖️ Mixed Results', 'A mix of cooperation and defection.', 'You balanced trust and self-interest.', 'This is realistic. In life, trust must be earned gradually.', '⚖️ The Pragmatic Player');
            }
        }

        function showRound() {
            const html = `<div class="stage-badge">Round ${gameState.round} of 5</div><div class="opponent-speech"><p>🔒 The prosecutor says: "Your partner is in another room. If you confess, you go free. If you stay silent, you rely on their loyalty."</p></div><button class="choice-btn" onclick="makeChoice('cooperate')">🤐 Stay Silent</button><button class="choice-btn" onclick="makeChoice('defect')">🗣️ Confess & Betray</button>`;
            document.getElementById('gameContent').innerHTML = html;
        }

        function setPartnerPattern() { const patterns = ['aggressive', 'normal', 'forgiving']; gameState.partnerPattern = patterns[Math.floor(Math.random() * patterns.length)]; }
        setPartnerPattern(); showRound(); updateUI();
    </script>
</body>
</html>
