<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Jerusalem Coexistence Simulator - Islamic Framework | Tadbeer Studio</title>
    <link rel="stylesheet" href="/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        .j-container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        .game-panel { background: #0f172a; border-radius: 28px; padding: 30px; margin-bottom: 25px; box-shadow: 0 8px 25px rgba(0,0,0,0.3); border: 1px solid #fbbf24; }
        .stage-badge { display: inline-block; background: #fbbf24; color: #0f172a; padding: 4px 12px; border-radius: 50px; font-size: 0.7rem; font-weight: bold; margin-bottom: 15px; }
        .quran-box { background: #1e293b; padding: 20px; border-radius: 20px; margin: 15px 0; border-right: 4px solid #fbbf24; color: #e2e8f0; }
        .quran-box .arabic { font-size: 1.2rem; font-family: 'Amiri', serif; color: #fbbf24; margin-bottom: 8px; }
        .historical-note { background: #1e293b; padding: 15px; border-radius: 16px; margin: 15px 0; border-left: 4px solid #3b82f6; font-size: 0.9rem; color: #cbd5e1; }
        .choice-btn { display: block; width: 100%; padding: 16px 20px; margin: 12px 0; background: #1e293b; border: 2px solid #fbbf24; border-radius: 20px; cursor: pointer; transition: all 0.2s; text-align: left; font-size: 1rem; font-weight: 500; color: #e2e8f0; }
        .choice-btn:hover { background: #fbbf24; color: #0f172a; transform: translateX(8px); }
        .stats-row { display: flex; justify-content: space-between; gap: 15px; margin-bottom: 25px; flex-wrap: wrap; }
        .stat-card { background: #1e293b; padding: 12px; border-radius: 16px; text-align: center; flex: 1; border: 1px solid #fbbf24; color: #e2e8f0; }
        .stat-value { font-size: 1.4rem; font-weight: bold; color: #fbbf24; }
        .outcome-card { background: #1e293b; border-radius: 24px; padding: 25px; margin-top: 20px; border: 1px solid #fbbf24; display: none; animation: fadeIn 0.5s; color: #e2e8f0; }
        .restart-btn { background: #fbbf24; color: #0f172a; border: none; padding: 14px 30px; border-radius: 50px; cursor: pointer; font-weight: bold; margin-top: 20px; width: 100%; }
        .reflection-box { background: #0f172a; padding: 20px; border-radius: 20px; margin-top: 20px; border-left: 4px solid #fbbf24; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 768px) { .j-container { padding: 12px; } .choice-btn { padding: 12px; font-size: 0.9rem; } }
    </script>
</head>
<body>
    <div id="navbar-placeholder"></div>
    <div class="bismillah">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ<div class="bismillah-translation">In the name of Allah, the Most Gracious, the Most Merciful</div></div>
    <div class="j-container">
        <h1 class="page-title" style="text-align: center; color: #fbbf24;">🕊️ Jerusalem Coexistence Simulator</h1>
        <p class="page-subtitle" style="text-align: center; color: #cbd5e1;">Walk through 150 years of history. The simulator presents Islamic rulings for each situation based on the Quran and Sunnah. Make your choice — then learn what Islam commands.</p>
        
        <!-- Islamic Framework Summary -->
        <div class="quran-box">
            <div class="arabic">وَلَا تَزِرُ وَازِرَةٌ وِزْرَ أُخْرَىٰ</div>
            <p><strong>📖 Islamic Framework for Resistance:</strong> The Prophet (ﷺ) used multiple strategies depending on the situation:</p>
            <ul style="margin-left: 20px; margin-top: 10px;">
                <li><strong>🕊️ Patience & Forgiveness:</strong> For personal offenses (Quran 42:40). The Prophet forgave those who personally harmed him.</li>
                <li><strong>🛡️ Self-Defense is Obligatory:</strong> "Whoever is killed in defense of his wealth, family, himself, or his religion is a martyr." (Hadith)</li>
                <li><strong>⚔️ Permission to Fight was revealed when Muslims were expelled:</strong> "Permission (to fight) is given to those fought against, because they have been wronged." (Quran 22:39-40)</li>
                <li><strong>📜 Treaties must be honored — unless the enemy breaks them:</strong> "If you fear betrayal from a people, then throw back their treaty to them fairly." (Quran 8:58)</li>
                <li><strong>🕌 Armed resistance against occupation is legitimate:</strong> International Islamic Fiqh Academy (2006): "Legitimate resistance to occupation through legally accepted means is a right."</li>
            </ul>
        </div>

        <div id="gamePanel" class="game-panel">
            <div class="stats-row">
                <div class="stat-card"><div class="stat-label">Palestinian Rights</div><div class="stat-value" id="rights">70</div></div>
                <div class="stat-card"><div class="stat-label">International Support</div><div class="stat-value" id="support">50</div></div>
                <div class="stat-card"><div class="stat-label">Resistance Unity</div><div class="stat-value" id="unity">60</div></div>
                <div class="stat-card"><div class="stat-label">Stage</div><div class="stat-value" id="stageNum">1</div></div>
            </div>
            <div id="gameContent"></div>
        </div>
        <a href="/simulators" class="btn-secondary">← Back to Simulators</a>
    </div>
    <div id="footer-placeholder"></div>
    <script src="/assets/js/components.js"></script>
    <script>
        let gameState = { stage: 1, rights: 70, support: 50, unity: 60, decisions: [] };
        function updateUI() {
            document.getElementById('rights').innerText = gameState.rights;
            document.getElementById('support').innerText = gameState.support;
            document.getElementById('unity').innerText = gameState.unity;
            document.getElementById('stageNum').innerText = gameState.stage;
        }
        function playSound(type) { try { const audioCtx = new (window.AudioContext || window.webkitAudioContext)(); const o = audioCtx.createOscillator(); const g = audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination); o.frequency.value = type === 'good' ? 660 : 220; g.gain.value = 0.1; o.start(); g.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.5); o.stop(audioCtx.currentTime + 0.5); } catch(e) {} }
        function endGame(outcome, message, details, islamicRuling, resistancePath) {
            playSound(outcome === 'victory' ? 'good' : 'bad');
            const html = `<div class="outcome-card" style="display: block;"><h3 style="color: #fbbf24;">${outcome.toUpperCase()} ENDING</h3><p>${message}</p><p>${details}</p><div class="reflection-box"><h4 style="color: #fbbf24;">📖 Islamic Ruling for This Situation</h4><p>${islamicRuling}</p><p>⚔️ <strong>Your chosen path:</strong> ${resistancePath}</p><p>🕌 <strong>The Prophet's (ﷺ) Example:</strong> He used patience when weak, migration when oppression was unbearable, defensive treaties when beneficial, armed defense when attacked, and conquest when treaties were broken. Different situations require different responses.</p><p>🌱 <strong>For the next generation:</strong> The Quran commands: "And prepare against them whatever you are able of power" (8:60). True justice requires strategic wisdom (Tadbeer) — knowing when to be patient, when to negotiate, and when to defend.</p></div><button class="restart-btn" onclick="location.reload()">🔄 Play Again</button></div>`;
            document.getElementById('gameContent').innerHTML = html;
        }
        function makeDecision(stage, choice) {
            playSound('good');
            if (stage === 1) {
                if (choice === 'protect') { gameState.decisions.push('protect'); gameState.rights += 10; gameState.unity += 5; updateUI(); showStage2(); }
                else if (choice === 'welcome') { gameState.decisions.push('welcome'); gameState.rights -= 10; gameState.support += 10; updateUI(); showStage2(); }
                else if (choice === 'reject') { gameState.decisions.push('reject'); gameState.rights += 5; gameState.unity += 10; gameState.support -= 10; updateUI(); showStage2(); }
                else if (choice === 'secret') { gameState.decisions.push('secret'); gameState.rights -= 20; gameState.unity -= 15; updateUI(); endGame('defeat', '💀 The Betrayal Path', 'You sold land secretly. When revealed, community trust collapsed. Palestinians were divided.', 'Quran 8:27: "Do not betray Allah and His Messenger, nor knowingly betray your trusts." Secret deals that harm the community are betrayal.', 'Secret deals always backfire. The community must be consulted (Shura).'); }
            }
            else if (stage === 2) {
                if (choice === 'diplomacy') { gameState.decisions.push('diplomacy'); gameState.rights += 5; gameState.support += 15; updateUI(); showStage3(); }
                else if (choice === 'armed') { gameState.decisions.push('armed'); gameState.rights -= 5; gameState.unity += 10; gameState.support -= 5; updateUI(); showStage3(); }
                else if (choice === 'nonviolent') { gameState.decisions.push('nonviolent'); gameState.rights += 10; gameState.support += 15; gameState.unity += 10; updateUI(); showStage3(); }
            }
            else if (stage === 3) {
                if (choice === 'unilateral') { gameState.decisions.push('unilateral'); gameState.rights -= 30; gameState.support -= 20; gameState.unity += 10; updateUI(); endGame('defeat', '💀 The Nakba Path', 'You declared a state unilaterally. War erupted. 750,000 Palestinians were expelled. 500+ villages destroyed.', 'The Prophet (ﷺ) did not declare unilateral statehood without international consensus. He negotiated treaties even from a weak position (Hudaybiyyah).', 'You should have sought a negotiated solution with international guarantees while preparing defensive capacity.'); }
                else if (choice === 'negotiate') { gameState.decisions.push('negotiate'); gameState.rights -= 5; gameState.support += 10; updateUI(); showStage4(); }
                else if (choice === 'resistance') { gameState.decisions.push('resistance'); gameState.rights += 5; gameState.unity += 15; gameState.support -= 5; updateUI(); showStage4(); }
            }
            else if (stage === 4) {
                if (choice === 'oslo') { gameState.decisions.push('oslo'); gameState.rights -= 15; gameState.support += 10; gameState.unity -= 15; updateUI(); showStage5(); }
                else if (choice === 'intifada') { gameState.decisions.push('intifada'); gameState.rights += 5; gameState.unity += 15; gameState.support -= 5; updateUI(); showStage5(); }
                else if (choice === 'bds') { gameState.decisions.push('bds'); gameState.rights += 10; gameState.support += 15; gameState.unity += 10; updateUI(); showStage5(); }
            }
            else if (stage === 5) {
                if (choice === 'one_state') { endGame('victory', '🌟 One Democratic State', 'Equal rights for all. Return of refugees. Jerusalem open to all faiths.', 'Quran 49:13: "O mankind, indeed We have created you from male and female and made you peoples and tribes that you may know one another." Justice and equality are Islamic principles.', 'Nonviolent resistance + international law + BDS + civil disobedience + defensive capacity'); }
                else if (choice === 'two_state') { endGame('partial', '⚖️ Two-State Compromise', 'A Palestinian state alongside Israel. Unresolved issues: settlements, refugees, Jerusalem.', 'Compromise is permissible when it brings benefit and prevents greater harm. But incomplete justice is not the final goal.', 'Diplomacy + compromise + continued pressure'); }
                else if (choice === 'armed_struggle') { endGame('victory', '⚔️ Armed Resistance Path', 'Sporadic military resistance continues. International sympathy fluctuates. Heavy casualties.', 'Quran 22:39-40: "Permission (to fight) is given to those fought against, because they have been wronged." Armed resistance against occupation is legitimate under Islamic law and international law.', 'Armed resistance + nonviolent mobilization + international solidarity'); }
                else if (choice === 'forgiveness') { endGame('victory', '🕊️ The Forgiveness Path', 'Return of refugees. Truth and reconciliation. Shared society.', 'Forgiveness is praiseworthy when the oppressor repents. But if the aggression continues, defense is obligatory. The Prophet (ﷺ) forgave his personal enemies but fought against those who waged war.', 'Civil disobedience + truth commissions + international solidarity + defensive capacity'); }
            }
        }
        function showStage1() { document.getElementById('gameContent').innerHTML = `<div class="stage-badge">STAGE 1: 1880s - The Ottoman Millet System</div><div class="quran-box"><div class="arabic">وَلَا تَزِرُ وَازِرَةٌ وِزْرَ أُخْرَىٰ</div><p><strong>📖 Islamic Ruling:</strong> At this stage, Zionist settlers arrived as refugees fleeing persecution in Europe. Islam commands justice and good treatment of refugees: "Allah does not forbid you from those who do not fight you in religion nor expel you from your homes — to be righteous and just toward them." (Quran 60:8)</p></div><div class="historical-note">📜 For 500 years, Muslims, Christians, and Jews lived under the Millet system — each community governed its own religious laws. Jerusalem was an open city. Then, Zionist settlers from Europe began arriving, seeking a "Jewish state."</div><button class="choice-btn" onclick="makeDecision(1, 'protect')">🛡️ Protect Palestinian land rights (Legal measures)</button><button class="choice-btn" onclick="makeDecision(1, 'welcome')">🤝 Welcome settlers as refugees (With conditions)</button><button class="choice-btn" onclick="makeDecision(1, 'reject')">🚫 Reject them entirely</button><button class="choice-btn" onclick="makeDecision(1, 'secret')">🤫 Secret land sales (TRAP)</button>`; updateUI(); }
        function showStage2() { gameState.stage = 2; updateUI(); document.getElementById('gameContent').innerHTML = `<div class="stage-badge">STAGE 2: 1917-1947 - The British Mandate</div><div class="quran-box"><div class="arabic">وَإِن جَنَحُوا لِلسَّلْمِ فَاجْنَحْ لَهَا</div><p><strong>📖 Islamic Ruling:</strong> "If they incline to peace, then incline to it as well." (Quran 8:61). The Prophet (ﷺ) always preferred negotiation and treaties when possible. However, he also prepared defensive capacity: "And prepare against them whatever you are able of power." (Quran 8:60)</p></div><div class="historical-note">📜 The Balfour Declaration (1917) promised a "national home for the Jewish people" in Palestine. Zionist immigration accelerated. Palestinian resistance grew.</div><button class="choice-btn" onclick="makeDecision(2, 'diplomacy')">🌍 Seek international diplomacy</button><button class="choice-btn" onclick="makeDecision(2, 'armed')">⚔️ Armed revolt (1936-1939)</button><button class="choice-btn" onclick="makeDecision(2, 'nonviolent')">🕊️ Nonviolent resistance (Gandhi-style)</button>`; }
        function showStage3() { gameState.stage = 3; updateUI(); document.getElementById('gameContent').innerHTML = `<div class="stage-badge">STAGE 3: 1948 - The Nakba</div><div class="quran-box"><div class="arabic">أُذِنَ لِلَّذِينَ يُقَاتَلُونَ بِأَنَّهُمْ ظُلِمُوا</div><p><strong>📖 Islamic Ruling:</strong> "Permission (to fight) is given to those fought against, because they have been wronged." (Quran 22:39-40) — This was the FIRST verse permitting fighting, revealed when Muslims were expelled from their homes. Armed resistance against expulsion and occupation is LEGITIMATE under Islamic law.</p></div><div class="historical-note">📜 On May 14, 1948, Israel declared independence. War erupted. 750,000 Palestinians were expelled. Over 500 villages were destroyed. Palestinians call this the Nakba ("Catastrophe").</div><button class="choice-btn" onclick="makeDecision(3, 'unilateral')">📜 Declare independence unilaterally (Historical path)</button><button class="choice-btn" onclick="makeDecision(3, 'negotiate')">🤝 Negotiate with neighbors</button><button class="choice-btn" onclick="makeDecision(3, 'resistance')">⚔️ Armed resistance + civil defense (Legitimate under Islamic law)</button>`; }
        function showStage4() { gameState.stage = 4; updateUI(); document.getElementById('gameContent').innerHTML = `<div class="stage-badge">STAGE 4: 1967-1993 - Occupation & Intifadas</div><div class="quran-box"><div class="arabic">فَإِن جَاءُوكَ فَاحْكُم بَيْنَهُمْ أَوْ أَعْرِضْ عَنْهُمْ</div><p><strong>📖 Islamic Ruling:</strong> The Prophet (ﷺ) honored treaties as long as the enemy honored them. When the Quraysh broke the Treaty of Hudaybiyyah, he conquered Mecca. If treaties are broken, there is no obligation to uphold them. "If you fear betrayal from a people, then throw back their treaty to them fairly." (Quran 8:58)</p></div><div class="historical-note">📜 1967: Israel occupied the West Bank, Gaza, East Jerusalem, Golan Heights. Settlements began. 1987: First Intifada (uprising). 1993: Oslo Accords — Palestinian Authority established.</div><button class="choice-btn" onclick="makeDecision(4, 'oslo')">🤝 Accept Oslo Accords (Historical path)</button><button class="choice-btn" onclick="makeDecision(4, 'intifada')">✊ Continue armed resistance (Intifada)</button><button class="choice-btn" onclick="makeDecision(4, 'bds')">📢 Boycott, Divestment, Sanctions (BDS) movement</button>`; }
        function showStage5() { gameState.stage = 5; updateUI(); document.getElementById('gameContent').innerHTML = `<div class="stage-badge">STAGE 5: 2025 - The Crossroads</div><div class="quran-box"><div class="arabic">وَأَعِدُّوا لَهُم مَّا اسْتَطَعْتُم مِّن قُوَّةٍ</div><p><strong>📖 Islamic Ruling:</strong> "And prepare against them whatever you are able of power." (Quran 8:60) — This includes military, economic, diplomatic, and technological capacity. The International Islamic Fiqh Academy (2006) affirmed: "Legitimate resistance to occupation through legally accepted means is a right."</p></div><div class="historical-note">📜 Gaza: 2.3 million people under siege. Over 50,000 killed since October 2023. ICJ says occupation is "unlawful." ICC issues arrest warrants. Ceasefires have been repeatedly broken by Israel.</div><button class="choice-btn" onclick="makeDecision(5, 'one_state')">🌟 One democratic state for all</button><button class="choice-btn" onclick="makeDecision(5, 'two_state')">⚖️ Two-state solution with justice</button><button class="choice-btn" onclick="makeDecision(5, 'armed_struggle')">⚔️ Armed resistance (Legitimate under Islamic law)</button><button class="choice-btn" onclick="makeDecision(5, 'forgiveness')">🕊️ Return + Reconciliation (If oppression ends)</button>`; }
        showStage1(); updateUI();
    </script>
</body>
</html>
