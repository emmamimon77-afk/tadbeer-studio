<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Jerusalem Coexistence - Enhanced | Tadbeer Studio</title>
    <link rel="stylesheet" href="/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        .j-container { max-width: 900px; margin: 0 auto; padding: 20px; }
        .game-panel { background: linear-gradient(135deg, #2d1b4e, #1a0f2e); border-radius: 28px; padding: 30px; margin-bottom: 25px; box-shadow: 0 8px 25px rgba(0,0,0,0.3); border: 1px solid #a855f7; }
        .stage-badge { display: inline-block; background: #a855f7; color: white; padding: 4px 12px; border-radius: 50px; font-size: 0.7rem; font-weight: bold; margin-bottom: 15px; }
        .choice-btn { display: block; width: 100%; padding: 16px 20px; margin: 12px 0; background: #2d1b4e; border: 2px solid #a855f7; border-radius: 20px; cursor: pointer; transition: all 0.2s; text-align: left; font-size: 1rem; font-weight: 500; color: #e2e8f0; }
        .choice-btn:hover { background: #a855f7; transform: translateX(8px); }
        .stats-row { display: flex; justify-content: space-between; gap: 15px; margin-bottom: 25px; flex-wrap: wrap; }
        .stat-card { background: #2d1b4e; padding: 12px; border-radius: 16px; text-align: center; flex: 1; border: 1px solid #a855f7; }
        .stat-value { font-size: 1.4rem; font-weight: bold; color: #a855f7; }
        .outcome-card { background: #2d1b4e; border-radius: 24px; padding: 25px; margin-top: 20px; border: 1px solid #a855f7; display: none; animation: fadeIn 0.5s; }
        .restart-btn { background: #a855f7; color: white; border: none; padding: 14px 30px; border-radius: 50px; cursor: pointer; font-weight: bold; margin-top: 20px; width: 100%; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 768px) { .j-container { padding: 12px; } .choice-btn { padding: 12px; font-size: 0.9rem; } }
    </style>
</head>
<body>
    <div id="navbar-placeholder"></div>
    <div class="bismillah">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ<div class="bismillah-translation">In the name of Allah, the Most Gracious, the Most Merciful</div></div>
    <div class="j-container">
        <h1 class="page-title" style="text-align: center; color: #a855f7;">🕊️ Jerusalem Coexistence - Enhanced</h1>
        <p class="page-subtitle" style="text-align: center;">5 stages. Hidden consequences. Sound effects. Multiple endings.</p>
        <div id="gamePanel" class="game-panel">
            <div class="stats-row">
                <div class="stat-card"><div class="stat-label">Coexistence</div><div class="stat-value" id="coexistence">85</div></div>
                <div class="stat-card"><div class="stat-label">Trust</div><div class="stat-value" id="trust">80</div></div>
                <div class="stat-card"><div class="stat-label">Pressure</div><div class="stat-value" id="pressure">20</div></div>
                <div class="stat-card"><div class="stat-label">Stage</div><div class="stat-value" id="stageNum">1</div></div>
            </div>
            <div id="gameContent"></div>
        </div>
        <a href="/simulators" class="btn-secondary">← Back to Simulators</a>
    </div>
    <div id="footer-placeholder"></div>
    <script src="/assets/js/components.js"></script>
    <script>
        let gameState = { stage: 1, coexistence: 85, trust: 80, pressure: 20, decisions: [] };
        function updateUI() {
            document.getElementById('coexistence').innerText = gameState.coexistence;
            document.getElementById('trust').innerText = gameState.trust;
            document.getElementById('pressure').innerText = gameState.pressure;
            document.getElementById('stageNum').innerText = gameState.stage;
        }
        function playSound(type) {
            try { const audioCtx = new (window.AudioContext || window.webkitAudioContext)(); const o = audioCtx.createOscillator(); const g = audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination); o.frequency.value = type === 'good' ? 660 : 220; g.gain.value = 0.1; o.start(); g.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.5); o.stop(audioCtx.currentTime + 0.5); } catch(e) {}
        }
        function endGame(outcome, message, details, reflection, correctStrategy, personality) {
            playSound(outcome === 'victory' ? 'good' : 'bad');
            const html = `<div class="outcome-card" style="display: block;"><h3 style="color: #a855f7;">${outcome.toUpperCase()} ENDING</h3><p>${message}</p><p>${details}</p><div style="background: #1a0f2e; padding: 20px; border-radius: 20px; margin: 20px 0;"><h4 style="color: #a855f7;">🧠 Reflection</h4><p><strong>Why:</strong> ${reflection}</p><p><strong>Correct strategy:</strong> ${correctStrategy}</p><hr><p><strong>🎭 Profile:</strong> ${personality}</p><p><strong>📖 Prophetic Tadbeer:</strong> The Prophet (ﷺ) taught that justice and coexistence are foundations of a righteous society.</p></div><button class="restart-btn" onclick="location.reload()">🔄 Play Again</button></div>`;
            document.getElementById('gameContent').innerHTML = html;
        }
        function makeDecision(stage, choice) {
            playSound('good');
            if (stage === 1) {
                if (choice === 'welcome') { gameState.decisions.push('welcome'); gameState.coexistence += 10; gameState.trust += 15; updateUI(); showStage2(); }
                else if (choice === 'reject') { gameState.decisions.push('reject'); gameState.coexistence -= 20; gameState.trust -= 20; gameState.pressure += 30; updateUI(); endGame('defeat', '💀 Rejection Path', 'Harsh rejection pushed settlers to seek imperial support.', 'Rejection without diplomacy backfired.', 'Engage diplomatically while protecting rights.', '⚡ The Rigid Traditionalist'); }
                else if (choice === 'secret_deal') { gameState.decisions.push('secret'); gameState.coexistence -= 30; gameState.trust -= 40; updateUI(); endGame('defeat', '🎭 Betrayal Path', 'Secret deals destroyed community trust.', 'Secrecy always backfires.', 'Transparency and consultation are essential.', '🎭 The Deceptive Broker'); }
            }
            else if (stage === 2) {
                if (choice === 'protect') { gameState.decisions.push('protect'); gameState.coexistence += 15; gameState.trust += 10; updateUI(); showStage3(); }
                else if (choice === 'ignore') { gameState.decisions.push('ignore'); gameState.coexistence -= 20; gameState.trust -= 25; gameState.pressure += 30; updateUI(); endGame('defeat', '💀 Ignorance Path', 'Ignoring the threat allowed it to grow.', 'Ignoring problems never solves them.', 'Address issues early with clear red lines.', '😰 The Avoidant Leader'); }
            }
            else if (stage === 3) {
                if (choice === 'nonviolent') { gameState.decisions.push('nonviolent'); gameState.coexistence += 20; gameState.trust += 15; updateUI(); showStage4(); }
                else if (choice === 'armed') { gameState.decisions.push('armed'); gameState.coexistence -= 15; gameState.trust -= 10; gameState.pressure += 40; updateUI(); endGame('defeat', '⚔️ Armed Revolt Path', 'Premature armed resistance was crushed.', 'Violence without strategy leads to defeat.', 'Use nonviolent resistance and international pressure.', '⚡ The Impulsive Fighter'); }
            }
            else if (stage === 4) {
                if (choice === 'one_state') { endGame('victory', '🌟 One-State Solution', 'Equal rights for all. Justice restored.', 'You chose equality over domination.', 'The Prophet\'s (ﷺ) Medina model works.', '🕊️ The Justice Seeker'); }
                else if (choice === 'two_state') { endGame('partial', '⚖️ Two-State Compromise', 'Partial peace, unresolved issues remain.', 'Compromise brought some peace.', 'Better than war, but justice incomplete.', '⚖️ The Pragmatic Compromiser'); }
                else if (choice === 'forgiveness') { endGame('victory', '🕊️ Forgiveness Ending', 'Return of refugees. Truth commission. True peace.', 'You chose the hardest path: justice with mercy.', 'This is the highest Tadbeer.', '🕊️ The Sage of Justice'); }
            }
        }
        function showStage1() { document.getElementById('gameContent').innerHTML = `<div class="stage-badge">STAGE 1: 1880s</div><div class="opponent-speech" style="background:#2d1b4e; padding:20px; border-radius:20px; margin:15px 0; border-left:4px solid #a855f7;">Zionist settlers arrive. Ottomans are indifferent.</div><button class="choice-btn" onclick="makeDecision(1, 'welcome')">🤝 Welcome settlers with conditions</button><button class="choice-btn" onclick="makeDecision(1, 'reject')">🚫 Reject them entirely</button><button class="choice-btn" onclick="makeDecision(1, 'secret_deal')">🤫 Secret land deals (TRAP)</button>`; updateUI(); }
        function showStage2() { gameState.stage = 2; updateUI(); document.getElementById('gameContent').innerHTML = `<div class="stage-badge">STAGE 2: 1917-1947</div><div class="opponent-speech" style="background:#2d1b4e; padding:20px; border-radius:20px; margin:15px 0; border-left:4px solid #a855f7;">British Mandate. Zionist immigration accelerates.</div><button class="choice-btn" onclick="makeDecision(2, 'protect')">🛡️ Protect rights through law</button><button class="choice-btn" onclick="makeDecision(2, 'ignore')">😴 Ignore the threat</button>`; }
        function showStage3() { gameState.stage = 3; updateUI(); document.getElementById('gameContent').innerHTML = `<div class="stage-badge">STAGE 3: 1948</div><div class="opponent-speech" style="background:#2d1b4e; padding:20px; border-radius:20px; margin:15px 0; border-left:4px solid #a855f7;">Nakba. 750,000 expelled.</div><button class="choice-btn" onclick="makeDecision(3, 'nonviolent')">🕊️ Nonviolent resistance</button><button class="choice-btn" onclick="makeDecision(3, 'armed')">⚔️ Armed resistance (TRAP)</button>`; }
        function showStage4() { gameState.stage = 4; updateUI(); document.getElementById('gameContent').innerHTML = `<div class="stage-badge">STAGE 4: 2025</div><div class="opponent-speech" style="background:#2d1b4e; padding:20px; border-radius:20px; margin:15px 0; border-left:4px solid #a855f7;">The world watches. Apartheid accusations grow.</div><button class="choice-btn" onclick="makeDecision(4, 'one_state')">🌟 One democratic state for all</button><button class="choice-btn" onclick="makeDecision(4, 'two_state')">⚖️ Two-state solution</button><button class="choice-btn" onclick="makeDecision(4, 'forgiveness')">🕊️ Return + Reconciliation (Secret)</button>`; }
        showStage1(); updateUI();
    </script>
</body>
</html>
